                { en: "Make up for lost time.", vi: "Bù đắp thời gian đã mất." },
                { en: "Out of the blue.", vi: "Bất thình lình." },
                { en: "As soon as possible.", vi: "Càng sớm càng tốt." },
                { en: "Take your time.", vi: "Cứ thong thả." },
                { en: "On a daily basis.", vi: "Hàng ngày." },
                { en: "Every now and then.", vi: "Thỉnh thoảng." },
                { en: "In no time.", vi: "Ngay lập tức." },
                { en: "Against the clock.", vi: "Chạy đua với thời gian." },
                { en: "Beat the clock.", vi: "Hoàn thành trước hạn." },
                { en: "Time's up.", vi: "Hết giờ rồi." },
                { en: "Make time for...", vi: "Dành thời gian cho..." },
                { en: "Behind schedule.", vi: "Chậm tiến độ." }
            ]},
            10: { name: "10. Thành ngữ & Lóng", items: [
                { en: "Break a leg!", vi: "Chúc may mắn!" },
                { en: "Piece of cake.", vi: "Dễ như ăn bánh." },
                { en: "Under the weather.", vi: "Không khỏe." },
                { en: "Costs an arm and a leg.", vi: "Rất đắt đỏ." },
                { en: "Let the cat out of the bag.", vi: "Để lộ bí mật." },
                { en: "Hit the nail on the head.", vi: "Nói trúng phóc." },
                { en: "Bite the bullet.", vi: "Cắn răng chịu đựng." },
                { en: "The best of both worlds.", vi: "Vẹn cả đôi đường." },
                { en: "See eye to eye.", vi: "Đồng quan điểm." },
                { en: "Break the ice.", vi: "Phá vỡ sự ngại ngùng." },
                { en: "Spill the beans.", vi: "Tiết lộ bí mật." },
                { en: "Once in a blue moon.", vi: "Hiếm khi." },
                { en: "A blessing in disguise.", vi: "Trong cái rủi có cái may." },
                { en: "Don't cry over spilt milk.", vi: "Đừng hối tiếc chuyện đã qua." },
                { en: "Keep an eye on...", vi: "Để mắt tới..." },
                { en: "Call it a day.", vi: "Nghỉ tay thôi." },
                { en: "Hang in there.", vi: "Cố gắng lên." },
                { en: "Cutting corners.", vi: "Làm tắt/đốt cháy giai đoạn." },
                { en: "Go the extra mile.", vi: "Nỗ lực vượt bậc." },
                { en: "Easy does it.", vi: "Cứ bình tĩnh mà làm." }
            ]}
        };

        let currentGroup = 1;
        let currentIndex = 0;

        function init() {
            const select = document.getElementById('groupSelect');
            if (select) {
                select.innerHTML = '';
                for (let id in phraseData) {
                    let opt = document.createElement('option');
                    opt.value = id;
                    opt.textContent = phraseData[id].name;
                    select.appendChild(opt);
                }
            }
            loadGroupData();
        }

        function applyTheme(id) {
            const theme = themes[id] || themes[1];
            const bodyBg = document.getElementById('bodyBg');
            const iconBg = document.getElementById('iconBg');
            const speakBtn = document.getElementById('speakBtn');
            const cardBack = document.getElementById('cardBack');
            const checkBtn = document.getElementById('checkBtn');
            const tagEn = document.getElementById('tagEn');

            if (bodyBg) bodyBg.style.backgroundColor = theme.bg;
            if (iconBg) iconBg.style.backgroundColor = theme.primary;
            if (speakBtn) speakBtn.style.backgroundColor = theme.primary;
            if (cardBack) cardBack.style.backgroundColor = theme.primary;
            if (checkBtn) checkBtn.style.backgroundColor = theme.primary;
            
            if (tagEn) {
                tagEn.style.backgroundColor = theme.light;
                tagEn.style.color = theme.primary;
            }

            // Cập nhật tab active
            const activeTab = document.querySelector('.active-tab-btn');
            if (activeTab) activeTab.style.backgroundColor = theme.primary;
        }

        function loadGroupData() {
            const select = document.getElementById('groupSelect');
            if (select) {
                currentGroup = select.value;
            }
            currentIndex = 0;
            applyTheme(currentGroup);
            updateCard();
            setupQuiz();
        }

        function updateCard() {
            const group = phraseData[currentGroup];
            if (!group) return;
            const items = group.items;
            const flashcard = document.getElementById('flashcard');
            if (flashcard) flashcard.classList.remove('card-flipped');
            
            const phraseEn = document.getElementById('phraseEn');
            const phraseVi = document.getElementById('phraseVi');
            const counter = document.getElementById('counter');

            if (phraseEn) phraseEn.textContent = items[currentIndex].en;
            if (phraseVi) phraseVi.textContent = items[currentIndex].vi;
            if (counter) counter.textContent = `${currentIndex + 1} / ${items.length}`;
        }

        function nextPhrase() {
            const items = phraseData[currentGroup].items;
            currentIndex = (currentIndex + 1) % items.length;
            updateCard();
        }

        function prevPhrase() {
            const items = phraseData[currentGroup].items;
            currentIndex = (currentIndex - 1 + items.length) % items.length;
            updateCard();
        }

        function speakText(event) {
            if (event) event.stopPropagation();
            const text = phraseData[currentGroup].items[currentIndex].en;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                
                const voices = window.speechSynthesis.getVoices();
                const femaleVoice = voices.find(v => (v.name.includes('Female') || v.name.includes('Google US English') || v.name.includes('Samantha') || v.name.includes('Zira')) && v.lang.startsWith('en'));
                if (femaleVoice) utterance.voice = femaleVoice;

                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        function changeTab(tab) {
            const isLearn = tab === 'learn';
            const learnSection = document.getElementById('learnSection');
            const quizSection = document.getElementById('quizSection');
            if (learnSection) learnSection.classList.toggle('hidden', !isLearn);
            if (quizSection) quizSection.classList.toggle('hidden', isLearn);
            
            const theme = themes[currentGroup];
            const tabLearn = document.getElementById('tab-learn');
            const tabQuiz = document.getElementById('tab-quiz');

            if (tabLearn && tabQuiz) {
                if (isLearn) {
                    tabLearn.className = "flex-1 py-3 font-bold rounded-xl transition-all duration-300 text-white shadow-md active-tab-btn";
                    tabQuiz.className = "flex-1 py-3 font-bold rounded-xl transition-all duration-300 text-slate-500 hover:text-blue-500";
                    tabLearn.style.backgroundColor = theme.primary;
                    tabQuiz.style.backgroundColor = 'transparent';
                } else {
                    tabQuiz.className = "flex-1 py-3 font-bold rounded-xl transition-all duration-300 text-white shadow-md active-tab-btn";
                    tabLearn.className = "flex-1 py-3 font-bold rounded-xl transition-all duration-300 text-slate-500 hover:text-blue-500";
                    tabQuiz.style.backgroundColor = theme.primary;
                    tabLearn.style.backgroundColor = 'transparent';
                }
            }
        }

        function setupQuiz() {
            const group = phraseData[currentGroup];
            if (!group) return;

            const quizGroupName = document.getElementById('quizGroupName');
            if (quizGroupName) quizGroupName.textContent = group.name;

            const items = [...group.items].sort(() => Math.random() - 0.5).slice(0, 5);
            const allVi = group.items.map(i => i.vi).sort(() => Math.random() - 0.5);
            
            const quizContent = document.getElementById('quizContent');
            if (quizContent) {
                quizContent.innerHTML = '';
                items.forEach((item) => {
                    const div = document.createElement('div');
                    div.className = "p-4 bg-slate-50 rounded-2xl border-2 border-transparent transition-all";
                    div.innerHTML = `
                        <p class="font-bold text-slate-700 mb-2">${item.en}</p>
                        <select data-answer="${item.vi}" class="quiz-answer w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                            <option value="">Chọn nghĩa đúng...</option>
                            ${allVi.map(v => `<option value="${v}">${v}</option>`).join('')}
                        </select>
                    `;
                    quizContent.appendChild(div);
                });
            }
            
            const feedback = document.getElementById('quizFeedback');
            if (feedback) feedback.classList.add('hidden');
        }

        function checkQuiz() {
            const selects = document.querySelectorAll('.quiz-answer');
            let correctCount = 0;
            
            selects.forEach(select => {
                const container = select.parentElement;
                if (select.value === select.dataset.answer) {
                    correctCount++;
                    container.style.borderColor = "#10b981";
                    container.style.backgroundColor = "#ecfdf5";
                } else {
                    container.style.borderColor = "#ef4444";
                    container.style.backgroundColor = "#fef2f2";
                }
            });

            const feedback = document.getElementById('quizFeedback');
            if (feedback) {
                feedback.classList.remove('hidden');
                if (correctCount === selects.length) {
                    feedback.className = "mt-6 p-4 rounded-2xl bg-green-500 text-white font-bold text-center";
                    feedback.innerHTML = "Tuyệt đỉnh! Bạn đã thuộc lòng nhóm này!";
                } else {
                    feedback.className = "mt-6 p-4 rounded-2xl bg-orange-100 text-orange-700 font-bold text-center";
                    feedback.innerHTML = `Bạn đúng ${correctCount}/${selects.length}. Thử lại chút nhé!`;
                }
            }
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {};
        }

        window.onload = init;
    </script>
</body>
</html>
